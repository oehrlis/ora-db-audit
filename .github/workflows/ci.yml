# SPDX-License-Identifier: Apache-2.0
# CI workflow for ora-db-audit
# Runs on push/PR to main and on version tags.
# Jobs: markdownlint, shellcheck, bats, pytest, build-dist (tags only).
# No Oracle DB connection required - all tests use fixture bundles.

name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint
        run: markdownlint "**/*.md" --ignore node_modules

  lint-shell:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck bin/ and scripts/
        run: |
          find bin/ scripts/ -name "*.sh" -print0 \
            | xargs -0 shellcheck -x -S warning

  test-bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: sudo npm install -g bats
      - name: Run bats tests
        run: bats tests/bats/

  test-pytest:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Run pytest
        run: python -m pytest tests/python/ -v

  build-dist:
    name: Build and release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ lint-markdown, lint-shell, test-bats, test-pytest ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build tarball and base64 copy
        run: make dist
      - name: Extract release notes from CHANGELOG
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          awk "/^## \[${version}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release-notes.md
      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.tar.gz \
            dist/*.tar.gz.b64 \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release-notes.md
